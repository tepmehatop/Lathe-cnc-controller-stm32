<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ELS STM32F407 — Полная схема подключения</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; font-family:'Segoe UI',sans-serif; overflow:hidden; }
#toolbar { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(15,20,40,0.95);
  padding:8px 16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #333; }
#toolbar h1 { color:#e94560; font-size:1em; white-space:nowrap; }
#toolbar span { color:#888; font-size:0.8em; }
.tbtn { background:#0f3460; border:1px solid #444; color:#ccc; padding:5px 12px;
  border-radius:4px; cursor:pointer; font-size:0.82em; }
.tbtn:hover { background:#1a4a80; color:#fff; }
#zoom-val { color:#aaa; font-size:0.82em; min-width:40px; }
#canvas-wrap { position:fixed; top:44px; left:0; right:0; bottom:0; overflow:hidden; cursor:grab; }
#canvas-wrap.grabbing { cursor:grabbing; }
canvas { display:block; }
#legend { position:fixed; bottom:12px; right:12px; background:rgba(15,20,40,0.9);
  border:1px solid #333; border-radius:6px; padding:10px; font-size:0.72em; }
#legend div { display:flex; align-items:center; gap:6px; margin:3px 0; color:#ccc; }
#legend div span { width:24px; height:3px; display:inline-block; border-radius:2px; }
</style>
</head>
<body>
<div id="toolbar">
  <h1>ELS — STM32F4DISCOVERY Wiring Diagram</h1>
  <span>Полная схема подключения с компонентами</span>
  <button class="tbtn" onclick="zoom(1.2)">＋ Zoom</button>
  <button class="tbtn" onclick="zoom(0.83)">－ Zoom</button>
  <button class="tbtn" onclick="resetView()">⌂ Сброс</button>
  <button class="tbtn" onclick="window.location='pinout.html'">← Все схемы</button>
  <span id="zoom-val">100%</span>
</div>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
</div>
<div id="legend">
  <div><span style="background:#00bcd4"></span>UART</div>
  <div><span style="background:#9c27b0"></span>I2C</div>
  <div><span style="background:#ff9800"></span>Шаговые моторы</div>
  <div><span style="background:#4caf50"></span>Энкодеры</div>
  <div><span style="background:#2196f3"></span>Кнопки/Джойстик</div>
  <div><span style="background:#ffeb3b"></span>Лимиты/LED</div>
  <div><span style="background:#8bc34a"></span>Прочее</div>
</div>
<script>
// ============================================================
// CANVAS SETUP + PAN/ZOOM
// ============================================================
const W = 3200, H = 2200;
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

let scale = 0.5, tx = 0, ty = 0;
let drag = false, lastX, lastY;

function applyTransform() {
  canvas.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  canvas.style.transformOrigin = '0 0';
  document.getElementById('zoom-val').textContent = Math.round(scale*100)+'%';
}
function zoom(f) {
  const cx = wrap.clientWidth/2, cy = wrap.clientHeight/2;
  tx = cx - f*(cx - tx);
  ty = cy - f*(cy - ty);
  scale *= f;
  applyTransform();
}
function resetView() {
  scale = 0.48;
  tx = (wrap.clientWidth - W*scale)/2;
  ty = 20;
  applyTransform();
}
wrap.addEventListener('mousedown', e => { drag=true; lastX=e.clientX; lastY=e.clientY; wrap.classList.add('grabbing'); });
wrap.addEventListener('mousemove', e => { if(!drag) return; tx+=e.clientX-lastX; ty+=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY; applyTransform(); });
wrap.addEventListener('mouseup', () => { drag=false; wrap.classList.remove('grabbing'); });
wrap.addEventListener('wheel', e => { e.preventDefault(); zoom(e.deltaY<0?1.1:0.9); }, {passive:false});
// Touch
let t0=null;
wrap.addEventListener('touchstart', e=>{ if(e.touches.length===1){drag=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;} if(e.touches.length===2){t0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:true});
wrap.addEventListener('touchmove', e=>{ if(e.touches.length===1&&drag){tx+=e.touches[0].clientX-lastX;ty+=e.touches[0].clientY-lastY;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;applyTransform();}if(e.touches.length===2&&t0){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);zoom(d/t0);t0=d;}},{passive:true});
wrap.addEventListener('touchend',()=>{drag=false;t0=null;});

// ============================================================
// DRAWING HELPERS
// ============================================================
function rect(x,y,w,h,fill,stroke,r=4){
  ctx.beginPath();
  if(r>0){ctx.roundRect(x,y,w,h,r);}else{ctx.rect(x,y,w,h);}
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();}
}
function text(str,x,y,size=12,color='#ddd',align='left',bold=false){
  ctx.font=(bold?'bold ':'')+size+'px Consolas,monospace';
  ctx.fillStyle=color;
  ctx.textAlign=align;
  ctx.fillText(str,x,y);
}
function line(x1,y1,x2,y2,color='#555',w=2){
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
  ctx.strokeStyle=color;ctx.lineWidth=w;ctx.stroke();
}
// Wire: array of [x,y] points
function wire(pts,color='#555',w=2){
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.strokeStyle=color;ctx.lineWidth=w;ctx.stroke();
}
// Dot junction
function dot(x,y,color='#fff'){
  ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
}
// Resistor (horizontal): rect symbol
function resistor(x,y,val,color='#aaa'){
  const W=28,H=12;
  rect(x-W/2,y-H/2,W,H,'#2a2a2a',color,2);
  text(val,x,y-H/2-4,9,color,'center');
}
// Resistor (vertical)
function resistorV(x,y,val,color='#aaa'){
  const W=12,H=28;
  rect(x-W/2,y-H/2,W,H,'#2a2a2a',color,2);
  ctx.save();ctx.translate(x,y-H/2-14);ctx.rotate(-Math.PI/2);
  text(val,0,0,9,color,'center');ctx.restore();
}
// Capacitor (horizontal)
function capacitor(x,y,val,color='#aaa'){
  const gap=6,h=16;
  line(x-gap/2,y-h/2,x-gap/2,y+h/2,color,2);
  line(x+gap/2,y-h/2,x+gap/2,y+h/2,color,2);
  text(val,x,y-h/2-4,9,color,'center');
}
// Capacitor (vertical)
function capacitorV(x,y,val,color='#aaa'){
  const gap=6,w=16;
  line(x-w/2,y-gap/2,x+w/2,y-gap/2,color,2);
  line(x-w/2,y+gap/2,x+w/2,y+gap/2,color,2);
  text(val,x+w/2+4,y,9,color,'left');
}
// LED symbol
function led(x,y,dir='right',color='#f44336'){
  ctx.save();ctx.translate(x,y);
  if(dir==='left')ctx.rotate(Math.PI);
  if(dir==='up')ctx.rotate(-Math.PI/2);
  if(dir==='down')ctx.rotate(Math.PI/2);
  ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(8,-7);ctx.lineTo(8,7);ctx.closePath();
  ctx.fillStyle=color+'88';ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
  line(8,-8,8,8,color,2);
  ctx.restore();
}
// VCC rail symbol
function vcc(x,y,label='3.3V'){
  line(x,y,x,y-16,'#f44336',2);
  line(x-12,y-16,x+12,y-16,'#f44336',2);
  line(x-8,y-20,x+8,y-20,'#f44336',1.5);
  line(x-4,y-24,x+4,y-24,'#f44336',1);
  text(label,x,y-28,9,'#f88',align='center');
}
// GND symbol
function gnd(x,y){
  line(x,y,x,y+10,'#888',2);
  line(x-10,y+10,x+10,y+10,'#888',2);
  line(x-6,y+14,x+6,y+14,'#888',1.5);
  line(x-2,y+18,x+2,y+18,'#888',1);
}
// Component box (peripheral)
function compBox(x,y,w,h,title,color,pins=[]){
  rect(x,y,w,h,'#0d1f3a',color,6);
  // header bar
  rect(x,y,w,22,color+'33',color,6);
  text(title,x+w/2,y+15,11,color,'center',true);
  // pins inside
  pins.forEach((p,i)=>{
    const py=y+30+i*16;
    text(p[0],x+6,py+10,9,'#aaa','left');
    if(p[1]) text(p[1],x+w-6,py+10,9,'#666','right');
  });
}
// Pin on board side
function boardPin(bx,by,side,idx,total,label,color='#ccc'){
  const step=28;
  let x,y,tx2,ty2,ta;
  if(side==='left'){
    x=bx; y=by+idx*step;
    tx2=x-8; ty2=y+5; ta='right';
    rect(x-12,y-3,12,14,'#1a1a3a',color,1);
    rect(x-14,y,4,8,color,null,0); // pin tab
  } else if(side==='right'){
    x=bx; y=by+idx*step;
    tx2=x+8; ty2=y+5; ta='left';
    rect(x,y-3,12,14,'#1a1a3a',color,1);
    rect(x+10,y,4,8,color,null,0);
  } else if(side==='top'){
    x=bx+idx*step; y=by;
    tx2=x; ty2=y-6; ta='center';
    rect(x-7,y-12,14,12,'#1a1a3a',color,1);
    rect(x-4,y-14,8,4,color,null,0);
  } else { // bottom
    x=bx+idx*step; y=by;
    tx2=x; ty2=y+18; ta='center';
    rect(x-7,y,14,12,'#1a1a3a',color,1);
    rect(x-4,y+10,8,4,color,null,0);
  }
  text(label,tx2,ty2,8,color,ta);
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw(){
  // Background
  ctx.fillStyle='#111827';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#1a2035'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=50){line(x,0,x,H,'#1a2035',0.5);}
  for(let y=0;y<H;y+=50){line(0,y,W,y,'#1a2035',0.5);}

  // Title
  text('ELS — Электронная Гитара Токарного Станка',W/2,48,24,'#e94560','center',true);
  text('STM32F4DISCOVERY  •  STM32F407VGT6  •  168 МГц  •  Полная схема подключения',W/2,76,14,'#888','center');
  text('⚠ ПРЕДВАРИТЕЛЬНАЯ СХЕМА — пины могут быть переназначены под разводку шилда. Все параметры в Core/els_config.h',W/2,100,11,'#c97a00','center');

  // ============================================================
  // STM32F4DISCOVERY BOARD (центр)
  // ============================================================
  const BX=1230, BY=240, BW=380, BH=1420;
  // PCB body
  rect(BX,BY,BW,BH,'#0a2010','#2d6a20',8);
  // PCB inner area
  rect(BX+14,BY+14,BW-28,BH-28,'#0d2812',null,6);

  // Board title
  text('STM32F4DISCOVERY',BX+BW/2,BY+36,14,'#5dba42','center',true);
  text('STM32F407VGT6',BX+BW/2,BY+54,11,'#3a8c2a','center');

  // ST logo (stylized)
  rect(BX+BW/2-30,BY+65,60,22,'#1a3a50','#2196f3',4);
  text('ST',BX+BW/2-8,BY+81,12,'#2196f3','center',true);
  text('MICRO',BX+BW/2+10,BY+81,7,'#1565c0','center');

  // Main IC chip
  rect(BX+80,BY+200,BW-160,BH-580,'#111','#444',6);
  text('STM32F407VGT6',BX+BW/2,BY+280,10,'#888','center');
  text('LQFP-100',BX+BW/2,BY+296,9,'#666','center');
  text('168 MHz',BX+BW/2,BY+312,9,'#666','center');
  text('Cortex-M4F+FPU',BX+BW/2,BY+328,9,'#666','center');
  text('1MB Flash',BX+BW/2,BY+344,9,'#666','center');
  text('192KB RAM',BX+BW/2,BY+360,9,'#666','center');

  // USB connector (top)
  rect(BX+BW/2-24,BY+1370,48,36,'#222','#888',4);
  rect(BX+BW/2-14,BY+1394,28,28,'#333',null,2);
  text('Mini-USB',BX+BW/2,BY+1418,8,'#888','center');
  text('(Power/Debug)',BX+BW/2,BY+1430,7,'#666','center');

  // Reset button
  rect(BX+BW-60,BY+1360,36,24,'#444','#888',3);
  text('RST',BX+BW-42,BY+1376,8,'#888','center');

  // User buttons
  rect(BX+24,BY+1360,36,24,'#00448c','#2196f3',3);
  text('USR',BX+42,BY+1376,8,'#2196f3','center');

  // LEDs onboard
  for(let i=0;i<4;i++){
    const lc=['#4caf50','#f9a825','#e53935','#1565c0'][i];
    ctx.beginPath();ctx.arc(BX+60+i*22,BY+100,6,0,Math.PI*2);
    ctx.fillStyle=lc+'88';ctx.fill();ctx.strokeStyle=lc;ctx.lineWidth=1;ctx.stroke();
  }
  text('PD12-15 (LED onboard)',BX+130,BY+112,8,'#666','left');

  // SWD header
  rect(BX+BW-80,BY+30,56,36,'#1a3020','#4caf50',3);
  text('SWD',BX+BW-52,BY+46,8,'#4caf50','center',true);
  text('PA13 SWDIO',BX+BW-52,BY+58,7,'#666','center');
  text('PA14 SWCLK',BX+BW-52,BY+66,7,'#666','center');

  // ============================================================
  // LEFT SIDE PINS (на левом краю платы)
  // ============================================================
  const LP=BX; // левый край
  const PIN_STEP=28;
  const LEFT_PINS=[
    // [y_offset_from_BY+100, label, color, connection_group]
    [0,  'PA3',  '#00bcd4', 'dro'],
    [28, 'PA9',  '#00bcd4', 'debug'],
    [56, 'PA10', '#00bcd4', 'debug'],
    [112,'PB6',  '#9c27b0', 'i2c'],
    [140,'PB7',  '#9c27b0', 'i2c'],
    [196,'PA0',  '#4caf50', 'enc_sp'],
    [224,'PA1',  '#4caf50', 'enc_sp'],
    [280,'PC2',  '#4caf50', 'enc_h'],
    [308,'PC3',  '#4caf50', 'enc_h'],
    [336,'PD0',  '#4caf50', 'enc_h'],
    [364,'PD1',  '#4caf50', 'enc_h'],
    [392,'PD2',  '#4caf50', 'enc_h'],
    [420,'PD3',  '#4caf50', 'enc_h'],
    [476,'PC4',  '#2196f3', 'joy'],
    [504,'PC5',  '#2196f3', 'joy'],
    [532,'PC6',  '#2196f3', 'joy'],
    [560,'PC7',  '#2196f3', 'joy'],
    [588,'PC8',  '#2196f3', 'joy'],
    [644,'PD12', '#8bc34a', 'beep'],
  ];

  LEFT_PINS.forEach(([dy,label,color])=>{
    const py=BY+120+dy;
    // Pin pad on board edge
    rect(LP-10,py-5,10,10,'#1a1a1a',color,1);
    // Pin tab (connector nub)
    rect(LP-14,py-3,4,6,color,null,0);
    // Label inside board
    text(label,LP+6,py+4,9,color,'left');
  });

  // ============================================================
  // RIGHT SIDE PINS
  // ============================================================
  const RP=BX+BW;
  const RIGHT_PINS=[
    [0,  'PE0',  '#00bcd4', 'esp'],
    [28, 'PE1',  '#00bcd4', 'esp'],
    [84, 'PE8',  '#8bc34a', 'tacho'],
    [112,'PE9',  '#ff9800', 'mot_y'],
    [140,'PE10', '#ff9800', 'mot_y'],
    [168,'PE11', '#ff9800', 'mot_y'],
    [224,'PE13', '#ff9800', 'mot_x'],
    [252,'PE14', '#ff9800', 'mot_x'],
    [280,'PE15', '#ff9800', 'mot_x'],
    [336,'PF0',  '#ffeb3b', 'lim'],
    [364,'PF1',  '#ffeb3b', 'lim'],
    [392,'PF2',  '#ffeb3b', 'lim'],
    [420,'PF3',  '#ffeb3b', 'lim'],
    [448,'PF4',  '#ffeb3b', 'lim'],
    [476,'PF5',  '#ffeb3b', 'lim'],
    [504,'PF6',  '#ffeb3b', 'lim'],
    [532,'PF7',  '#ffeb3b', 'lim'],
    [588,'PG5',  '#2196f3', 'sub'],
    [616,'PG6',  '#2196f3', 'sub'],
    [644,'PG7',  '#2196f3', 'sub'],
    [700,'PG0',  '#2196f3', 'btn'],
    [728,'PG1',  '#2196f3', 'btn'],
    [756,'PG2',  '#2196f3', 'btn'],
    [784,'PG3',  '#2196f3', 'btn'],
    [812,'PG4',  '#2196f3', 'btn'],
    [868,'PG8',  '#2196f3', 'mode'],
    [896,'PG9',  '#2196f3', 'mode'],
    [924,'PG10', '#2196f3', 'mode'],
    [952,'PG11', '#2196f3', 'mode'],
    [980,'PG12', '#2196f3', 'mode'],
    [1008,'PG13','#2196f3', 'mode'],
    [1036,'PG14','#2196f3', 'mode'],
    [1064,'PG15','#2196f3', 'mode'],
  ];

  RIGHT_PINS.forEach(([dy,label,color])=>{
    const py=BY+120+dy;
    rect(RP,py-5,10,10,'#1a1a1a',color,1);
    rect(RP+10,py-3,4,6,color,null,0);
    text(label,RP-6,py+4,9,color,'right');
  });

  // ============================================================
  // LEFT PERIPHERALS
  // ============================================================
  const CW=220; // component box width

  // === DRO HS800-2 ===
  const DX=60,DY=BY+100;
  rect(DX,DY,CW,130,'#0a1a2a','#00bcd4',6);
  rect(DX,DY,CW,22,'#00bcd422','#00bcd4',6);
  text('DRO HS800-2',DX+CW/2,DY+15,11,'#00bcd4','center',true);
  text('STM32F030 UART',DX+8,DY+36,9,'#aaa','left');
  text('57600/8N1',DX+8,DY+50,9,'#666','left');
  text('TX (3.3V) ●',DX+CW-10,DY+50,9,'#00bcd4','right');
  text('29-byte packet',DX+8,DY+66,9,'#666','left');
  text('CRC16/MODBUS',DX+8,DY+80,9,'#666','left');
  text('X: bytes[6..9]',DX+8,DY+96,8,'#888','left');
  text('Y: bytes[10..13]',DX+8,DY+110,8,'#888','left');
  text('GND',DX+8,DY+125,9,'#888','left');

  // Wire: DRO TX → capacitor → PA3
  const dro_y=DY+50;
  const pa3_y=BY+120+0;
  const pa3_x=LP-14;
  // horizontal wire from DRO to mid, then to PA3
  wire([[DX+CW,dro_y],[pa3_x-60,dro_y],[pa3_x-60,pa3_y],[pa3_x,pa3_y]],'#00bcd4',2);
  // Capacitor on wire (decoupling)
  capacitor(pa3_x-60+40,dro_y,'100нФ','#00bcd4');
  // GND for cap
  gnd(pa3_x-60+40,dro_y+8);
  // label
  text('USART2_RX',pa3_x-60+40,dro_y-22,8,'#00bcd480','center');

  // === DEBUG UART ===
  const DBGX=60,DBGY=BY+235;
  rect(DBGX,DBGY,CW,100,'#0a1a2a','#00bcd4',6);
  rect(DBGX,DBGY,CW,22,'#00bcd422','#00bcd4',6);
  text('Debug / Serial Monitor',DBGX+CW/2,DBGY+15,10,'#00bcd4','center',true);
  text('USART1 via ST-Link VCP',DBGX+8,DBGY+36,9,'#aaa','left');
  text('115200 baud',DBGX+8,DBGY+52,9,'#666','left');
  text('TX (PA9)  ●',DBGX+CW-10,DBGY+52,9,'#00bcd4','right');
  text('RX (PA10) ●',DBGX+CW-10,DBGY+68,9,'#00bcd4','right');
  text('USB → PC Serial',DBGX+8,DBGY+84,8,'#666','left');

  const pa9_y=BY+120+28, pa10_y=BY+120+56;
  wire([[DBGX+CW,DBGY+52],[pa3_x-30,DBGY+52],[pa3_x-30,pa9_y],[pa3_x,pa9_y]],'#00bcd4',2);
  wire([[DBGX+CW,DBGY+68],[pa3_x-20,DBGY+68],[pa3_x-20,pa10_y],[pa3_x,pa10_y]],'#00bcd4',2);
  // resistors on TX line
  resistor(pa3_x-30+30,DBGY+52,'33Ω','#00bcd4');

  // === LCD2004 ===
  const LX=60,LY=BY+460;
  rect(LX,LY,CW,150,'#160a2a','#9c27b0',6);
  rect(LX,LY,CW,22,'#9c27b022','#9c27b0',6);
  text('LCD 2004 (старый дисплей)',LX+CW/2,LY+15,10,'#9c27b0','center',true);
  text('I2C • PCF8574 • addr 0x27',LX+8,LY+36,9,'#aaa','left');
  text('400 кГц',LX+8,LY+52,9,'#666','left');
  text('20 символов × 4 строки',LX+8,LY+68,9,'#666','left');
  text('VCC: 5В',LX+8,LY+84,9,'#888','left');

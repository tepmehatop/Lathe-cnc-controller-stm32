; ============================================================================
; ELS — Электронная Гитара Токарного Станка
; Платформа: STM32F4DISCOVERY (STM32F407VGT6)
; ============================================================================

[platformio]
default_envs = stm32f407_discovery

; ============================================================================
; Основная прошивка STM32F407
; ============================================================================
[env:stm32f407_discovery]
platform  = ststm32
board     = disco_f407vg
framework = arduino

; STM32duino Arduino Core — максимальная совместимость с существующим кодом
board_build.core = stm32

; Скорость загрузки через ST-Link (встроен в DISCOVERY)
upload_protocol = stlink

; Serial Monitor через ST-Link VCP
monitor_speed = 115200
monitor_filters = send_on_enter, colorize

; Оптимизация: -O2 для скорости (критично для генерации STEP-импульсов)
build_src_filter =
    +<*>
    +<../Core/*.cpp>
    +<../Drivers/*.cpp>

build_flags =
    -DSTM32F407xx
    -DARDUINO_DISCO_F407VG
    -O2
    -Wall
    -I.
    -ICore
    -IDrivers

; Использовать FPU (аппаратная математика с плавающей точкой)
board_build.f_cpu   = 168000000L
board_build.f_flash = 8000000L

; ============================================================================
; ESP32-S3 JC4827W543 (новый дисплей) — без изменений из Arduino-проекта
; ============================================================================
[env:jc4827w543]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
board    = esp32-s3-devkitc-1
framework = arduino

monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
    -DJC4827W543_DISPLAY=1
    -DSCREEN_WIDTH=480
    -DSCREEN_HEIGHT=272
    -DTFT_CS=45
    -DTFT_SCK=47
    -DTFT_D0=21
    -DTFT_D1=48
    -DTFT_D2=40
    -DTFT_D3=39
    -DTFT_BL=1
    -DTOUCH_MODULES_GT911
    -DTOUCH_SCL=4
    -DTOUCH_SDA=8
    -DTOUCH_RST=38
    -DTOUCH_INT=3
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_LVGL_H_INCLUDE_SIMPLE=1
    -I.

lib_deps =
    lvgl/lvgl@8.4.0
    moononournation/GFX Library for Arduino@^1.4.6
    https://github.com/mmMicky/TouchLib.git

board_build.partitions      = huge_app.csv
board_build.arduino.memory_type = qio_opi

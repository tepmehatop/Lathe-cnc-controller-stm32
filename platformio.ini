; ============================================================================
; ELS — Электронная Гитара Токарного Станка
; Платформа: STM32F4DISCOVERY (STM32F407VGT6)
; ============================================================================

[platformio]
default_envs = stm32f407_discovery

; ============================================================================
; Основная прошивка STM32F407
; ============================================================================
[env:stm32f407_discovery]
platform  = ststm32
board     = disco_f407vg
framework = arduino

; STM32duino Arduino Core — максимальная совместимость с существующим кодом
board_build.core = stm32

; Скорость загрузки через ST-Link (встроен в DISCOVERY)
upload_protocol = stlink

; Serial Monitor через STM32 USB OTG (CN5) — подключите CN5 к ПК
; Serial = USB CDC через PA11/PA12 (USB OTG FS на Discovery board)
; CN5 = нижний mini-USB разъём на плате (НЕ тот, что рядом со ST-Link!)
monitor_port = /dev/cu.usbmodem*
monitor_speed = 115200
monitor_filters = send_on_enter, colorize

; Оптимизация: -O2 для скорости (критично для генерации STEP-импульсов)
build_src_filter =
    +<*>
    +<../Core/*.cpp>
    +<../Drivers/*.cpp>

build_flags =
    -DSTM32F407xx
    -DARDUINO_DISCO_F407VG
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSBD_USE_CDC
    -O2
    -Wall
    -I.
    -ICore
    -IDrivers
    -DSERIAL_TX_BUFFER_SIZE=512
    -DSERIAL_RX_BUFFER_SIZE=256

; Использовать FPU (аппаратная математика с плавающей точкой)
board_build.f_cpu   = 168000000L
board_build.f_flash = 8000000L

; ============================================================================
; ESP32-S3 JC4827W543 (новый дисплей) — без изменений из Arduino-проекта
; ============================================================================
[env:jc4827w543]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
board    = esp32-s3-devkitc-1
framework = arduino

monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder

build_src_filter = -<*> +<../ELS_Display/src/**>

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
    -DJC4827W543_DISPLAY=1
    -DSCREEN_WIDTH=480
    -DSCREEN_HEIGHT=272
    -DTFT_CS=45
    -DTFT_SCK=47
    -DTFT_D0=21
    -DTFT_D1=48
    -DTFT_D2=40
    -DTFT_D3=39
    -DTFT_BL=1
    -DTOUCH_MODULES_GT911
    -DTOUCH_SCL=4
    -DTOUCH_SDA=8
    -DTOUCH_RST=38
    -DTOUCH_INT=3
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_LVGL_H_INCLUDE_SIMPLE=1
    -I.
    -IELS_Display/include

lib_deps =
    lvgl/lvgl@8.4.0
    moononournation/GFX Library for Arduino@^1.4.6
    https://github.com/mmMicky/TouchLib.git

board_build.partitions      = huge_app.csv
board_build.arduino.memory_type = qio_opi

; ============================================================================
; ESP32-P4 JC8012P4A1C (10.1" 800x1280) — MIPI-DSI + GSL3680 Touch
;
; Как собрать:
;   pio run -e jc8012p4a1c
; Как прошить:
;   pio run -e jc8012p4a1c --target upload
;
; Требования:
;   Arduino-ESP32 >= 3.1.0 (поддержка ESP32-P4)
;   pioarduino platform >= 55.03.10
; ============================================================================
[env:jc8012p4a1c]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
board    = esp32-p4
framework = arduino

monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder

; Компилируем из ELS_Display/src/ (общий код) + ELS_Display_P4/src/ (драйверы дисплея)
build_src_filter =
    -<*>
    +<../ELS_Display/src/**>
    +<../ELS_Display_P4/src/**>

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
    -DJC8012P4A1C_DISPLAY=1
    -DSCREEN_WIDTH=1280
    -DSCREEN_HEIGHT=800
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_LVGL_H_INCLUDE_SIMPLE=1
    -I.
    -IELS_Display/include
    -IELS_Display_P4/include
    -IELS_Display_P4/src/lcd
    -IELS_Display_P4/src/touch

lib_deps =
    lvgl/lvgl@8.4.0

board_build.partitions      = huge_app.csv
board_build.arduino.memory_type = opi_opi

; ============================================================================
; DRO Симулятор — Arduino Mega 2560
; ============================================================================
[env:dro_simulator]
platform  = atmelavr
board     = megaatmega2560
framework = arduino

; Симулятор — отдельный src_dir, отдельная папка
; Запускать: pio run -e dro_simulator  (из папки Simulator/dro_simulator)

monitor_speed = 115200
